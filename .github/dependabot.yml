version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels:
      - dependencies
    commit-message:
      prefix: build(deps)
    cooldown:
      default-days: 7
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        patterns:
          - "*"
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: ci(deps)
    cooldown:
      default-days: 7
